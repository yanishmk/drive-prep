<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title">
  <title id="title">Depassement d un cycliste avec distance laterale</title>
  <defs>
    <g id="car">
      <rect x="-58" y="-26" width="116" height="52" rx="16" fill="#0f766e" stroke="#0f172a" stroke-width="3" />
      <rect x="-35" y="-14" width="70" height="13" rx="6" fill="#dbeafe" />
      <rect x="-35" y="4" width="70" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
    </g>
    <g id="bike">
      <circle cx="-18" cy="8" r="11" fill="none" stroke="#0f172a" stroke-width="4" />
      <circle cx="18" cy="8" r="11" fill="none" stroke="#0f172a" stroke-width="4" />
      <path d="M-18 8 L-3 -6 L18 8 L3 8 Z" fill="none" stroke="#0f172a" stroke-width="4" />
      <line x1="-3" y1="-6" x2="4" y2="-18" stroke="#0f172a" stroke-width="4" />
      <circle cx="4" cy="-20" r="5" fill="#0f172a" />
      <rect x="-26" y="-32" width="52" height="8" rx="4" fill="#2563eb" opacity="0.85" />
    </g>
  </defs>

  <rect width="1200" height="800" fill="#e2e8f0" />
  <rect x="120" y="170" width="960" height="460" rx="20" fill="#3f3f46" />

  <line x1="120" y1="170" x2="1080" y2="170" stroke="#f8fafc" stroke-width="6" />
  <line x1="120" y1="630" x2="1080" y2="630" stroke="#f8fafc" stroke-width="6" />
  <line x1="610" y1="170" x2="610" y2="630" stroke="#facc15" stroke-width="8" stroke-dasharray="34 24" />

  <g transform="translate(700 420)">
    <use href="#car" />
  </g>
  <g transform="translate(470 470)">
    <use href="#bike" />
  </g>

  <line x1="530" y1="470" x2="640" y2="470" stroke="#e2e8f0" stroke-width="6" stroke-dasharray="10 8" />
</svg>
