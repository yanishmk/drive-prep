<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title">
  <title id="title">Intersection congestionnee</title>
  <defs>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#52525b" />
      <stop offset="1" stop-color="#3f3f46" />
    </linearGradient>
    <g id="car-vert">
      <rect x="-56" y="-26" width="112" height="52" rx="16" fill="#0f766e" stroke="#0f172a" stroke-width="3" />
      <rect x="-33" y="-15" width="66" height="14" rx="6" fill="#dbeafe" />
      <rect x="-33" y="4" width="66" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-34" cy="28" r="7" fill="#111827" />
      <circle cx="34" cy="28" r="7" fill="#111827" />
      <rect x="51" y="-8" width="7" height="16" rx="2" fill="#fde68a" />
    </g>
    <g id="car-rouge">
      <rect x="-56" y="-26" width="112" height="52" rx="16" fill="#dc2626" stroke="#0f172a" stroke-width="3" />
      <rect x="-33" y="-15" width="66" height="14" rx="6" fill="#fee2e2" />
      <rect x="-33" y="4" width="66" height="12" rx="5" fill="#fecaca" />
      <circle cx="-34" cy="28" r="7" fill="#111827" />
      <circle cx="34" cy="28" r="7" fill="#111827" />
      <rect x="51" y="-8" width="7" height="16" rx="2" fill="#fde68a" />
    </g>
    <g id="car-bleu">
      <rect x="-56" y="-26" width="112" height="52" rx="16" fill="#2563eb" stroke="#0f172a" stroke-width="3" />
      <rect x="-33" y="-15" width="66" height="14" rx="6" fill="#dbeafe" />
      <rect x="-33" y="4" width="66" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-34" cy="28" r="7" fill="#111827" />
      <circle cx="34" cy="28" r="7" fill="#111827" />
      <rect x="51" y="-8" width="7" height="16" rx="2" fill="#fde68a" />
    </g>
  </defs>

  <rect width="1200" height="800" fill="#e2e8f0" />
  <rect x="430" y="0" width="340" height="800" fill="url(#road)" />
  <rect x="0" y="240" width="1200" height="320" fill="url(#road)" />
  <rect x="430" y="240" width="340" height="320" fill="#334155" />

  <line x1="430" y1="0" x2="430" y2="800" stroke="#f8fafc" stroke-width="6" />
  <line x1="770" y1="0" x2="770" y2="800" stroke="#f8fafc" stroke-width="6" />
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#f8fafc" stroke-width="6" />
  <line x1="0" y1="560" x2="1200" y2="560" stroke="#f8fafc" stroke-width="6" />

  <line x1="600" y1="0" x2="600" y2="240" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="600" y1="560" x2="600" y2="800" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="0" y1="400" x2="430" y2="400" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="770" y1="400" x2="1200" y2="400" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />

  <line x1="470" y1="585" x2="730" y2="585" stroke="#ffffff" stroke-width="9" />

  <g transform="translate(600 690)">
    <use href="#car-vert" />
  </g>
  <g transform="translate(600 182)">
    <use href="#car-rouge" />
  </g>
  <g transform="translate(600 104)">
    <use href="#car-rouge" />
  </g>
  <g transform="translate(300 400)">
    <use href="#car-bleu" />
  </g>
  <g transform="translate(905 400) rotate(180)">
    <use href="#car-bleu" />
  </g>

  <g transform="translate(784 128)">
    <circle cx="0" cy="0" r="19" fill="#22c55e" />
    <rect x="-12" y="21" width="24" height="72" rx="8" fill="#1f2937" />
  </g>
</svg>
