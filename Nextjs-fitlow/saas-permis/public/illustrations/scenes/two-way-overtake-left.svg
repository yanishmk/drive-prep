<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title">
  <title id="title">Depassement sur route a double sens</title>
  <defs>
    <g id="car-gray">
      <rect x="-58" y="-26" width="116" height="52" rx="16" fill="#64748b" stroke="#0f172a" stroke-width="3" />
      <rect x="-35" y="-14" width="70" height="13" rx="6" fill="#e2e8f0" />
      <rect x="-35" y="4" width="70" height="12" rx="5" fill="#cbd5e1" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
    </g>
    <g id="car-green">
      <rect x="-58" y="-26" width="116" height="52" rx="16" fill="#0f766e" stroke="#0f172a" stroke-width="3" />
      <rect x="-35" y="-14" width="70" height="13" rx="6" fill="#dbeafe" />
      <rect x="-35" y="4" width="70" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
    </g>
    <g id="car-blue">
      <rect x="-58" y="-26" width="116" height="52" rx="16" fill="#2563eb" stroke="#0f172a" stroke-width="3" />
      <rect x="-35" y="-14" width="70" height="13" rx="6" fill="#dbeafe" />
      <rect x="-35" y="4" width="70" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
    </g>
  </defs>

  <rect width="1200" height="800" fill="#dbeafe" />
  <rect x="120" y="80" width="960" height="640" rx="22" fill="#3f3f46" />

  <line x1="120" y1="80" x2="1080" y2="80" stroke="#f8fafc" stroke-width="6" />
  <line x1="120" y1="720" x2="1080" y2="720" stroke="#f8fafc" stroke-width="6" />
  <line x1="600" y1="80" x2="600" y2="720" stroke="#facc15" stroke-width="8" stroke-dasharray="32 20" />

  <g transform="translate(530 565)">
    <use href="#car-gray" />
  </g>
  <g transform="translate(690 470)">
    <use href="#car-green" />
  </g>
  <g transform="translate(600 245) rotate(180)">
    <use href="#car-blue" />
  </g>
