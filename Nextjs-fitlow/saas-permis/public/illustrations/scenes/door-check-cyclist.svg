  <rect x="710" y="332" width="24" height="78" rx="8" fill="#475569" stroke="#0f172a" stroke-width="4" />

  <g transform="translate(610 445)">
    <use href="#bike" />
  </g>

  <rect x="760" y="292" width="34" height="20" rx="4" fill="#f8fafc" />
  <line x1="725" y1="365" x2="640" y2="418" stroke="#f8fafc" stroke-width="6" stroke-dasharray="16 12" />
