  <rect width="1200" height="800" fill="#e2e8f0" />
  <rect x="150" y="70" width="900" height="660" rx="24" fill="#3f3f46" />

  <line x1="150" y1="70" x2="1050" y2="70" stroke="#f8fafc" stroke-width="6" />
  <line x1="150" y1="730" x2="1050" y2="730" stroke="#f8fafc" stroke-width="6" />
  <line x1="600" y1="70" x2="600" y2="730" stroke="#f8fafc" stroke-width="7" stroke-dasharray="34 24" />

  <g transform="translate(470 520)">
    <use href="#car-teal" />
  </g>
  <g transform="translate(730 560)">
    <use href="#car-red" />
  </g>

  <ellipse cx="655" cy="562" rx="90" ry="58" fill="#ef4444" opacity="0.22" />
  <ellipse cx="655" cy="562" rx="90" ry="58" fill="none" stroke="#ef4444" stroke-width="6" stroke-dasharray="14 10" />
