<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title">
  <title id="title">Virage a droite avec cycliste a droite</title>
  <defs>
    <g id="car-teal">
      <rect x="-56" y="-26" width="112" height="52" rx="16" fill="#0f766e" stroke="#0f172a" stroke-width="3" />
      <rect x="-34" y="-14" width="68" height="13" rx="6" fill="#dbeafe" />
      <rect x="-34" y="4" width="68" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
      <rect x="51" y="-7" width="7" height="14" rx="2" fill="#fde68a" />
    </g>
    <g id="car-blue">
      <rect x="-56" y="-26" width="112" height="52" rx="16" fill="#2563eb" stroke="#0f172a" stroke-width="3" />
      <rect x="-34" y="-14" width="68" height="13" rx="6" fill="#dbeafe" />
      <rect x="-34" y="4" width="68" height="12" rx="5" fill="#bfdbfe" />
      <circle cx="-36" cy="28" r="7" fill="#111827" />
      <circle cx="36" cy="28" r="7" fill="#111827" />
    </g>
    <g id="cyclist">
      <circle cx="-16" cy="6" r="11" fill="none" stroke="#0f172a" stroke-width="4" />
      <circle cx="16" cy="6" r="11" fill="none" stroke="#0f172a" stroke-width="4" />
      <path d="M-16 6 L-2 -6 L16 6 L2 6 Z" fill="none" stroke="#0f172a" stroke-width="4" />
      <line x1="-2" y1="-6" x2="5" y2="-18" stroke="#0f172a" stroke-width="4" />
      <circle cx="5" cy="-20" r="5" fill="#0f172a" />
      <rect x="-24" y="-30" width="48" height="8" rx="4" fill="#22c55e" opacity="0.85" />
    </g>
  </defs>

  <rect width="1200" height="800" fill="#e2e8f0" />
  <rect x="430" y="0" width="340" height="800" fill="#3f3f46" />
  <rect x="0" y="245" width="1200" height="310" fill="#3f3f46" />
  <rect x="430" y="245" width="340" height="310" fill="#334155" />

  <line x1="430" y1="0" x2="430" y2="800" stroke="#f8fafc" stroke-width="6" />
  <line x1="770" y1="0" x2="770" y2="800" stroke="#f8fafc" stroke-width="6" />
  <line x1="0" y1="245" x2="1200" y2="245" stroke="#f8fafc" stroke-width="6" />
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#f8fafc" stroke-width="6" />
  <line x1="600" y1="0" x2="600" y2="245" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="600" y1="555" x2="600" y2="800" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="0" y1="400" x2="430" y2="400" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />
  <line x1="770" y1="400" x2="1200" y2="400" stroke="#facc15" stroke-width="8" stroke-dasharray="36 20" />

  <line x1="455" y1="585" x2="745" y2="585" stroke="#ffffff" stroke-width="8" />
  <line x1="780" y1="300" x2="780" y2="500" stroke="#22c55e" stroke-width="6" stroke-dasharray="16 12" />

  <g transform="translate(600 680)">
    <use href="#car-teal" />
  </g>
  <g transform="translate(280 400) rotate(180)">
    <use href="#car-blue" />
  </g>
  <g transform="translate(780 420) rotate(-90)">
    <use href="#cyclist" />
  </g>
